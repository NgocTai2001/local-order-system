services:
  api:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/sqlite/tableflow.db}
      BASE_ORDER_URL: ${BASE_ORDER_URL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      WIFI_SSID: ${WIFI_SSID:-TABLEFLOW_ORDER}
      WIFI_PASSWORD: ${WIFI_PASSWORD:-order1234}
      WIFI_SECURITY: ${WIFI_SECURITY:-WPA}
      ADMIN_AUTH_REQUIRED: ${ADMIN_AUTH_REQUIRED:-true}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RESTAURANT_ID: ${RESTAURANT_ID:-}
      STORE_ID: ${STORE_ID:-}
      ADMIN_STORE_COLUMN: ${ADMIN_STORE_COLUMN:-}
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/uploads:/app/data/uploads
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    restart: unless-stopped
