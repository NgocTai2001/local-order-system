<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pho Viet - Thống kê</title>
    <link rel="stylesheet" href="/css/styles.css?v=85">
    <link rel="stylesheet" href="/admin/statistics.css?v=7">
  </head>
  <body>
    <header class="app-header admin-app-header">
      <div class="brand">
        <span class="brand-mark" data-restaurant-mark>PV</span>
        <span>
          <strong data-restaurant-name>Pho Viet</strong>
        </span>
      </div>
      <button class="ghost-button admin-logout-button" type="button" data-admin-logout hidden>Đăng xuất</button>
    </header>

    <main class="page-shell admin-page statistics-page">
      <nav class="admin-tabs" aria-label="Admin">
        <a class="tab-button" href="/admin">Quản lý bàn</a>
        <a class="tab-button" href="/admin?tab=menuTab">Menu</a>
        <a class="tab-button is-active" href="/admin/statistics.html" aria-current="page">Thống kê</a>
        <a class="tab-button" href="/admin?tab=restaurantTab">Thông tin quán</a>
      </nav>

      <h1 class="sr-only">Thống kê doanh thu</h1>

      <section class="statistics-toolbar" aria-label="Bộ lọc thống kê">
        <div class="statistics-period-tabs" id="statisticsPeriodTabs" role="tablist" aria-label="Khoảng thời gian">
          <button class="is-active" type="button" data-type="day" role="tab" aria-selected="true">Theo ngày</button>
          <button type="button" data-type="week" role="tab" aria-selected="false">Theo tuần</button>
          <button type="button" data-type="month" role="tab" aria-selected="false">Theo tháng</button>
        </div>
        <label class="statistics-date-field">
          <span class="statistics-calendar-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M7 3v4"></path>
              <path d="M17 3v4"></path>
              <path d="M4 9h16"></path>
              <rect x="4" y="5" width="16" height="16" rx="3"></rect>
            </svg>
          </span>
          <span class="sr-only">Chọn ngày thống kê</span>
          <input id="statisticsDate" type="date">
          <span class="statistics-date-display" id="statisticsDateDisplay" aria-hidden="true"></span>
        </label>
      </section>

      <section class="statistics-revenue-card" aria-labelledby="totalRevenueTitle">
        <div>
          <div class="statistics-card-label">
            <h2 id="totalRevenueTitle">Tổng doanh thu</h2>
            <span id="statisticsPeriodLabel"></span>
          </div>
          <strong class="statistics-revenue-value is-loading" id="totalRevenue">0 đ</strong>
          <p class="statistics-comparison" id="revenueComparison" aria-live="polite"></p>
        </div>
      </section>

      <section class="statistics-ranking-card" aria-labelledby="topItemsTitle">
        <div class="statistics-ranking-header">
          <div>
            <h2 id="topItemsTitle">Top món bán chạy</h2>
            <p>Sắp xếp theo tổng số lượng đã bán</p>
          </div>
          <span class="statistics-top-limit">Top 10</span>
        </div>

        <div class="statistics-list" id="statisticsList" aria-live="polite">
          <div class="statistics-skeleton-row"><span></span><span></span><span></span></div>
          <div class="statistics-skeleton-row"><span></span><span></span><span></span></div>
          <div class="statistics-skeleton-row"><span></span><span></span><span></span></div>
          <div class="statistics-skeleton-row"><span></span><span></span><span></span></div>
        </div>
        <p class="statistics-message" id="statisticsMessage" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/admin-auth.js?v=1"></script>
    <script>window.adminAuth.requireAdmin().catch(() => {});</script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js?v=11"></script>
    <script src="/admin/statistics.js?v=6"></script>
  </body>
</html>
