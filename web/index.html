<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pho Viet - Gọi món</title>
    <link rel="stylesheet" href="/css/styles.css?v=6">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" data-restaurant-mark>PV</span>
        <span>
          <strong data-restaurant-name>Pho Viet</strong>
          <small id="tableToken" hidden></small>
        </span>
      </div>
    </header>

    <main class="customer-shell">
      <section class="menu-area" aria-labelledby="menuTitle">
        <div class="section-bar">
          <div>
            <h1 id="menuTitle">Menu</h1>
            <p id="tableNotice">Quét QR trên bàn khi đặt món.</p>
          </div>
        </div>
        <div class="menu-list" id="menuList" aria-live="polite"></div>
      </section>

      <aside class="cart-area" aria-labelledby="cartTitle">
        <div class="section-bar compact">
          <div>
            <h2 id="cartTitle">Giỏ hàng</h2>
            <p id="cartCount">Chưa có món</p>
          </div>
        </div>
        <div class="cart-list" id="cartItems"></div>
        <div class="cart-footer">
          <div class="total-row">
            <span>Tổng</span>
            <strong id="cartTotal">0 đ</strong>
          </div>
          <button class="primary-button" id="submitOrder" type="button" disabled>Đặt món</button>
          <p class="message" id="orderMessage" aria-live="polite"></p>
        </div>
      </aside>
    </main>

    <script src="/js/api.js?v=5"></script>
    <script src="/js/customer.js?v=6"></script>
  </body>
</html>
